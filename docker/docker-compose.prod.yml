services:
  db:
    image: mariadb:10.11
    container_name: hat_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: hat_game
      MYSQL_USER: hat_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hat_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  php:
    build:
      context: ../back
      dockerfile: Dockerfile.fpm.prod
    container_name: hat_php
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://hat_user:${MYSQL_PASSWORD:-hat_password}@db:3306/hat_game?serverVersion=10.11.2-MariaDB&charset=utf8mb4
      APP_ENV: prod
      APP_DEBUG: 0
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
    volumes:
      - ../back:/var/www/html
      - symfony_var_cache:/var/www/html/var/cache
      - symfony_var_log:/var/www/html/var/log
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: hat_web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - php

volumes:
  symfony_var_cache:
  symfony_var_log:
  mysql_data:
