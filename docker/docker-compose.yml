services:
  db:
    image: mysql:8.0
    container_name: hat_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hat_game
      MYSQL_USER: hat_user
      MYSQL_PASSWORD: hat_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  php:
    build:
      context: ../back
      dockerfile: Dockerfile.fpm
    container_name: hat_php
    environment:
      DATABASE_URL: mysql://hat_user:hat_password@db:3306/hat_game?serverVersion=8.0
      APP_ENV: dev
      APP_DEBUG: 1
      CORS_ALLOW_ORIGIN: "*"
    volumes:
      - ../back:/var/www/html
      - symfony_var_cache:/var/www/html/var/cache
      - symfony_var_log:/var/www/html/var/log
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: newinterface-nginx:latest
    container_name: hat_backend
    volumes:
      - ../back:/var/www/html:ro
      - ./nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - php

  frontend:
    image: newinterface-frontend-nodejs:latest
    container_name: hat_frontend
    working_dir: /app
    environment:
      VITE_API_PROXY_TARGET: http://nginx:80
    command: sh -c "if [ ! -d node_modules/vite ]; then npm install; fi && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - nginx
    volumes:
      - ../front:/app
      - frontend_node_modules:/app/node_modules

volumes:
  symfony_var_cache:
  symfony_var_log:
  mysql_data:
  frontend_node_modules: