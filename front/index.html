<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Шляпа — игра</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      (function () {
        var allowed = { noir: 1, neon: 1, daylight: 1, fog: 1, grove: 1 }
        var fonts = {
          noir:
            'family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600',
          neon: 'family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700',
          daylight:
            'family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700',
          fog: 'family=Literata:opsz,wght@7..72,600;7..72,700&family=Source+Sans+3:wght@400;500;600;700',
          grove: 'family=Spectral:wght@600;700&family=Figtree:wght@400;500;600;700',
        }
        var t = 'noir'
        try {
          var stored = localStorage.getItem('hat-theme')
          if (allowed[stored]) t = stored
        } catch (e) {}
        document.documentElement.setAttribute('data-theme', t)
        var link = document.createElement('link')
        link.id = 'hat-theme-fonts'
        link.rel = 'stylesheet'
        link.href = 'https://fonts.googleapis.com/css2?' + fonts[t] + '&display=swap'
        document.head.appendChild(link)
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
